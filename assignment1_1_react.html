<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>레이아웃 실습</title>
    <style>
        /* body는 웹페이지 전체의 바탕입니다. 여기서 기본 글꼴, 여백, 글자색을 정합니다. */
        body {
            font-family: sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            color: #000;
        }

        /* header는 보통 페이지 상단 영역입니다. */
        header {
            margin-bottom: 30px;
        }
        header a {
            text-decoration: none;
            color: #4b0082; /* 보라색 링크 색상 */
            font-weight: bold;
            font-size: 1.1em;
        }

        /* layout-container는 main과 aside를 나란히 배치하는 큰 상자입니다. */
        .layout-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 60px;
        }

        /* main은 페이지에서 가장 중요한 본문 영역입니다. */
        main {
            flex: 1; /* 남은 공간을 모두 차지하도록 설정 */
            padding-right: 20px;
        }
        main h1 {
            font-size: 2.5em;
            margin-top: 0;
            margin-bottom: 20px;
        }

        /* aside는 옆에 붙는 보조 정보 영역입니다. */
        aside {
            width: 250px;
            background-color: #f5f5f5; /* 옅은 회색 배경 */
            padding: 20px;
            min-height: 150px; /* 이미지와 유사한 비율을 위한 최소 높이 */
        }
        aside h2 {
            font-size: 1.1em;
            margin-top: 0;
        }

        /* footer는 페이지 맨 아래에 들어가는 정보 영역입니다. */
        footer {
            border-top: 1px solid #d3d3d3; /* 상단 가로줄 */
            text-align: center;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <!-- header는 보통 맨 위의 메뉴나 링크를 넣는 곳입니다. -->
    <header>
        <a href="#">홈</a>
    </header>

    <!-- 이 div 안에서 본문과 옆 칸을 나란히 배치합니다. -->
    <div class="layout-container">
        
        <!-- main에는 이 페이지의 핵심 내용이 들어갑니다. -->
        <main>
            <h1>기사 제목</h1>
            <p>내용이 들어가는 곳입니다.</p>
        </main>

        <!-- aside에는 관련 정보나 보조 내용을 넣습니다. -->
        <aside>
            <h2>관련 정보</h2>
        </aside>

    </div>

    <!-- footer는 페이지 아래쪽의 마무리 정보입니다. -->
    <footer>
        <p>&copy; 2026 회사명</p>
    </footer>

</body>
</html>
